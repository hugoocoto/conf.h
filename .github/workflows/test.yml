name: test

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential curl
      - name: Build and install Lua from source
        run: |
          curl -L -R -O https://www.lua.org/ftp/lua-5.5.0.tar.gz
          tar zxf lua-5.5.0.tar.gz
          cd lua-5.5.0
          make linux
          sudo make install
          sudo ldconfig
      - name: Build and test
        run: make test_all

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and install Lua from source
        run: |
          curl -L -R -O https://www.lua.org/ftp/lua-5.5.0.tar.gz
          tar zxf lua-5.5.0.tar.gz
          cd lua-5.5.0
          make macosx
          sudo make install
      - name: Build and test
        run: make test_all

  freebsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: pkg install -y curl gmake gcc
          run: |
            curl -L -R -O https://www.lua.org/ftp/lua-5.5.0.tar.gz
            tar zxf lua-5.5.0.tar.gz
            cd lua-5.5.0
            gmake bsd
            gmake install
            cd ..
            gmake test_all
